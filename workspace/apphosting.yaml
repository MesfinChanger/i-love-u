runConfig:
  cpu: 1
  memoryMiB: 512
  maxInstances: 2

env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSy-REPLACE-IN-CONSOLE"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "spark-dating.firebaseapp.com"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "spark-dating"
    availability:
      - BUILD
      - RUNTIME
