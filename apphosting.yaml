# Firebase App Hosting configuration file.
# See https://firebase.google.com/docs/app-hosting/configure for details.

runConfig:
  cpu: 1
  memoryMiB: 512
  maxInstances: 2

env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    availability:
      - BUILD
      - RUNTIME
