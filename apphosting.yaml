kind: AppHostingConfig
schemaVersion: v1
runConfig:
  cpu: 1
  memoryMiB: 512
env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "" # Set this in the Firebase Console Secrets or Env vars
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "spark-dating.firebaseapp.com"
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "spark-dating"
  - variable: NEXT_PUBLIC_BASE_URL
    value: "https://spark-dating.web.app"
