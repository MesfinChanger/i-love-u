# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  maxInstances: 2
  memoryMiB: 512
  cpu: 1

scripts:
  # Explicitly using the next build command for better reliability
  build: npm run build
  run: npm run start

# Ensure the environment variables are accessible during runtime
env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "" # Will be populated via Firebase Console Secrets/Env
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "spark-dating.firebaseapp.com"
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "spark-dating"
